{% extends "base.html" %}
{% block title %}{{ "Edit" if vendor else "Add" }} Vendor{% endblock %}
{% block content %}
<div class="f-page-header">
  <h1 class="f-title">{{ "Edit" if vendor else "Add" }} Vendor</h1>
</div>
<div class="f-form-card">
  <form method="post" action="{{ '/vendors/'+vendor.id|string+'/edit' if vendor else '/vendors/new' }}">
    <div class="f-form-grid">
      <div class="f-field">
        <label class="f-label">Name <span class="f-required">*</span></label>
        <input type="text" name="name" class="f-input" required
               value="{{ vendor.name if vendor else '' }}" placeholder="Vendor name"/>
      </div>
      <div class="f-field">
        <label class="f-label">Email</label>
        <input type="email" name="email" class="f-input"
               value="{{ vendor.email if vendor else '' }}" placeholder="vendor@example.com"/>
      </div>
      <div class="f-field">
        <label class="f-label">Phone</label>
        <input type="tel" name="phone" class="f-input"
               value="{{ vendor.phone if vendor else '' }}" placeholder="+1 (555) 000-0000"/>
      </div>
    </div>
    <div class="f-field" style="margin-top:.75rem">
      <label class="f-label">Notes</label>
      <textarea name="notes" class="f-textarea" rows="2"
                placeholder="Optional notes">{{ vendor.notes if vendor else '' }}</textarea>
    </div>
    <div class="f-form-actions">
      <button class="f-btn f-btn-primary">{{ "Update" if vendor else "Save Vendor" }}</button>
      <a href="/vendors" class="f-btn f-btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
