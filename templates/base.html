<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Leads{% endblock %} · GBInc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=1.2.0" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="layout{% if hide_nav %} layout-full{% endif %}">
    {% if not hide_nav %}
    <aside class="sidebar no-print">
      <div class="brand">
        <img src="/static/logo.png" alt="GBInc" class="brand-logo" onerror="this.style.display='none'"/>
        <div class="brand-text">
          <span class="brand-name">GBInc</span>
          <span class="brand-sub">Leads</span>
        </div>
      </div>
      <div class="nav-section-label">Navigation</div>
      <nav class="nav">
        <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/leads" class="{% if page == 'leads' %}active{% endif %}">Leads</a>
        <a href="/deals" class="{% if page == 'deals' %}active{% endif %}">Active leads</a>
        <a href="/products" class="{% if page == 'products' %}active{% endif %}">Products</a>
        <a href="/generate" class="{% if page == 'generate' %}active{% endif %}">Generate</a>
        <a href="/add?tab=log" class="{% if page == 'add' %}active{% endif %}">Add or update</a>
        <a href="/summary" class="{% if page == 'summary' %}active{% endif %}">Summary</a>
      </nav>
      <div class="nav-footer-area">
        <a href="/finance/" class="nav-finance-btn">Finance →</a>
      </div>
    </aside>
    {% endif %}
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Confirmation modal (replaces window.confirm which is blocked in Tauri) -->
  <div id="app-confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:10px;padding:1.5rem 2rem;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);">
      <p id="app-confirm-msg" style="margin:0 0 1.25rem;font-size:0.95rem;line-height:1.5;color:#1e293b;"></p>
      <div style="display:flex;gap:.75rem;justify-content:flex-end;">
        <button id="app-confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="app-confirm-ok" class="btn btn-danger">Delete</button>
        <button id="app-confirm-ok-safe" class="btn btn-primary" style="display:none"></button>
      </div>
    </div>
  </div>
  <script>
  (function () {
    var overlay = document.getElementById('app-confirm-overlay');
    var msgEl   = document.getElementById('app-confirm-msg');
    var okBtn   = document.getElementById('app-confirm-ok');
    var okBtnSafe = document.getElementById('app-confirm-ok-safe');
    var cancelBtn = document.getElementById('app-confirm-cancel');
    var _resolve = null;

    function showConfirm(msg, okLabel) {
      msgEl.textContent = msg;
      // Use red danger button for "Delete", neutral primary for everything else
      var isDanger = !okLabel || okLabel === 'Delete';
      okBtn.textContent = isDanger ? (okLabel || 'Delete') : '';
      okBtn.style.display = isDanger ? '' : 'none';
      okBtnSafe.textContent = isDanger ? '' : okLabel;
      okBtnSafe.style.display = isDanger ? 'none' : '';
      overlay.style.display = 'flex';
      return new Promise(function (resolve) { _resolve = resolve; });
    }

    function handleOk() {
      overlay.style.display = 'none';
      if (_resolve) { _resolve(true); _resolve = null; }
    }
    okBtn.addEventListener('click', handleOk);
    okBtnSafe.addEventListener('click', handleOk);
    cancelBtn.addEventListener('click', function () {
      overlay.style.display = 'none';
      if (_resolve) { _resolve(false); _resolve = null; }
    });
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) {
        overlay.style.display = 'none';
        if (_resolve) { _resolve(false); _resolve = null; }
      }
    });

    // Intercept any form/button with data-confirm attribute.
    document.addEventListener('submit', function (e) {
      var form = e.target;
      var msg = form.getAttribute('data-confirm');
      if (!msg) return;
      e.preventDefault();
      showConfirm(msg, form.getAttribute('data-confirm-ok') || 'Delete').then(function (ok) {
        if (ok) form.submit();
      });
    }, true);

    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-confirm-click]');
      if (!btn) return;
      var msg = btn.getAttribute('data-confirm-click');
      e.preventDefault();
      showConfirm(msg, btn.getAttribute('data-confirm-ok') || 'Delete').then(function (ok) {
        if (ok) {
          var form = btn.closest('form');
          if (form) form.submit();
          else if (btn.tagName === 'A') window.location = btn.href;
        }
      });
    }, true);
  })();
  </script>
</body>
</html>
